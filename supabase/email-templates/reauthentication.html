<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify your identity</title>
</head>
<body style="margin:0;padding:0;background:#f8f9fa;color:#1a1a1a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f8f9fa;padding:32px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border:1px solid #e5e7eb;border-radius:16px;overflow:hidden;">
          <tr>
            <td style="padding:40px 36px 0;text-align:center;">
              <img
                src="https://www.basebase.com/basebase_logo-512.png"
                alt="Basebase"
                width="48"
                height="48"
                style="display:inline-block;height:48px;width:48px;border-radius:12px;"
              />
            </td>
          </tr>
          <tr>
            <td style="padding:24px 36px 0;text-align:center;">
              <h1 style="margin:0 0 12px;font-size:24px;line-height:1.3;color:#111;font-weight:700;">Verify your identity</h1>
              <p style="margin:0;color:#6b7280;font-size:15px;line-height:1.6;">Enter the code below to confirm a sensitive action on your Basebase account.</p>
            </td>
          </tr>
          <tr>
            <td style="padding:28px 36px 0;text-align:center;">
              <div style="display:inline-block;background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:16px 36px;">
                <span style="font-size:32px;font-weight:700;letter-spacing:6px;color:#111;font-family:'Courier New',Courier,monospace;">{{ .Token }}</span>
              </div>
            </td>
          </tr>
          <tr>
            <td style="padding:28px 36px;text-align:center;">
              <p style="margin:0;color:#9ca3af;font-size:12px;line-height:1.6;">If you didn&apos;t initiate this request, please secure your account immediately.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
